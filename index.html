<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLIX</title>

    <!-- Link CSS File -->
     <link rel="stylesheet" href="assets/css/style.css">
    <!--  -->

    <!-- Link Responsive Design MEDIA QUERE CSS File -->
     <link rel="stylesheet" href="assets/css/media.css">
    <!--  -->

    <!-- Link Favicon Icon Link -->
     <link rel="shortcut icon" href="assets/images/Netflix logo.png" type="image/x-icon">
    <!--  -->

    <!-- Link Font Awsome CDN ( Content Deleviery Network ) File -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--  -->

    <!-- Bootstrap CDN Link -->
     <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css'>
    <!--  -->

</head>
<body>
    


    <!-- Header Section ( Navbar Section ) -->
    <nav>
        <div class="left">
            <a href="/" class="logo"><img src="assets/images/fullname logo.png" alt=""></a>
            
            <ul>
                <li><a href="#" class="a_active">Home</a></li>
                <li><a href="#">TV Shows</a></li>
                <li><a href="#">New & Popular</a></li>
                <li><a href="#">My List</a></li>
                <li><a href="#">Browse by Languages</a></li>
            </ul>

        </div>
        <div class="right">

            <!-- Search -->
             <div class="search">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search...">
             </div>
            <!--  -->

            <!-- Notification -->
            <div class="noti">
                <i class="bi bi-bell"></i>
            </div> 

            <!-- Profile Section -->
             <div class="profile">
                <div class="profile-bx">
                    <img src="assets/images/profile1.png" alt="">
                    <i class="bi bi-caret-down-fill"></i>
                </div>
             </div>

        </div>
    </nav>
    <!-- Header (Navbar) End  -->



    <!-- (Landing Page) Video Section [ Start Here ] -->
    <section>

        <video muted loop autoplay>
            <source src="assets/video/money_heist.mp4" type="video/mp4" ></source>
        </video>

        <!-- Details Box -->
        <div class="section-detail">
            <img src="assets/images/Money-Heist logo.webp" alt="MoneyHeistLogo" class="det-logo">
            <div class="top-section">
                <div class="rank-bx">
                    <div class="rank">
                        <span>TOP</span>
                        <span>10</span>
                    </div>
                    <h1> #9 in TV Shows Today </h1>
                </div>
                <p>A suspenseful Spanish crime drama on Netflix, "Money Heist" follows a mastermind called The Professor and his crew performing meticulously planned, iconic robberies on Spain's banks.</p>
                <div class="play-mute">
                    <div class="play">
                        <button><i class="bi bi-play-fill"></i>Play</button>
                        <button><i class="bi bi-exclamation-circle-fill"></i>More Info</button>
                    </div>
                    <div class="mute">
                        <div class="mute-btn">
                            <i class="bi bi-volume-up-fill"></i>
                        </div>
                        <h6>A</h6>
                    </div>
                </div>
            </div>
        </div>

    </section>
    <!-- (Landing Page) Video Section [ End Here ] -->
















    <!-- Link JavaSCript File -->
     <script src="assets/js/script.js"></script>
    <!--  -->

</body>
</html>
